<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>URC v2.0 LCD Preview</title>
<style>
  body{margin:0;background:#1a1a1a;display:flex;flex-direction:column;align-items:center;padding:20px;gap:14px;font-family:monospace;color:#aaa}
  canvas{image-rendering:pixelated;border-radius:5px;border:1px solid #333}
  .lbl{font-size:12px;color:#888}
  .ctrls{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;max-width:560px}
  .ctrl{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:11px;color:#888}
  input[type=range]{width:80px;accent-color:#5c5}
  .bools{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
  .ck{display:flex;align-items:center;gap:4px;font-size:11px;cursor:pointer}
  input[type=checkbox]{accent-color:#5c5}
</style>
</head>
<body>
<div class="lbl">ST7920 128x64 — URC v2.0 (2x zoom)</div>
<canvas id="lcd" width="256" height="128"></canvas>
<div class="ctrls">
  <div class="ctrl">L-X<input type="range" id="lx" min="-99" max="99" value="30"></div>
  <div class="ctrl">L-Y<input type="range" id="ly" min="-99" max="99" value="-50"></div>
  <div class="ctrl">R-X<input type="range" id="rx" min="-99" max="99" value="60"></div>
  <div class="ctrl">R-Y<input type="range" id="ry" min="-99" max="99" value="40"></div>
  <div class="ctrl">P1<input type="range" id="p1" min="0" max="100" value="70"></div>
  <div class="ctrl">P2<input type="range" id="p2" min="0" max="100" value="30"></div>
  <div class="ctrl">BAT<input type="range" id="bat" min="0" max="100" value="82"></div>
</div>
<div class="bools">
  <label class="ck"><input type="checkbox" id="lb"> LB</label>
  <label class="ck"><input type="checkbox" id="ls"> LS</label>
  <label class="ck"><input type="checkbox" id="sw1" checked> S1</label>
  <label class="ck"><input type="checkbox" id="sw2"> S2</label>
  <label class="ck"><input type="checkbox" id="rs"> RS</label>
  <label class="ck"><input type="checkbox" id="rb"> RB</label>
  <label class="ck"><input type="checkbox" id="conn" checked> CONN</label>
</div>
<script>
const W=128,H=64;
const cv=document.getElementById('lcd');
const gx=cv.getContext('2d');
gx.imageSmoothingEnabled=false;
const buf=new Uint8Array(W*H);
let tick=0;

const sp=(x,y,v=1)=>{if(x>=0&&x<W&&y>=0&&y<H)buf[y*W+x]=v;};
const hl=(x,y,l,v=1)=>{for(let i=0;i<l;i++)sp(x+i,y,v);};
const vl=(x,y,l,v=1)=>{for(let i=0;i<l;i++)sp(x,y+i,v);};
const fr=(x,y,w,h,v=1)=>{hl(x,y,w,v);hl(x,y+h-1,w,v);vl(x,y,h,v);vl(x+w-1,y,h,v);};
const fb=(x,y,w,h,v=1)=>{for(let r=0;r<h;r++)for(let c=0;c<w;c++)sp(x+c,y+r,v);};

const F={
  ' ':[0,0,0,0,0,0],'0':[6,9,9,9,6,0],'1':[2,6,2,2,7,0],
  '2':[6,9,2,4,15,0],'3':[14,1,6,1,14,0],'4':[9,9,15,1,1,0],
  '5':[15,8,14,1,14,0],'6':[6,8,14,9,6,0],'7':[15,1,2,4,4,0],
  '8':[6,9,6,9,6,0],'9':[6,9,7,1,6,0],
  'A':[6,9,15,9,9,0],'B':[14,9,14,9,14,0],'C':[6,9,8,9,6,0],
  'D':[14,9,9,9,14,0],'E':[15,8,14,8,15,0],'F':[15,8,14,8,8,0],
  'G':[6,8,11,9,6,0],'H':[9,9,15,9,9,0],'I':[7,2,2,2,7,0],
  'K':[9,10,12,10,9,0],'L':[8,8,8,8,15,0],'M':[9,15,15,9,9,0],
  'N':[9,13,11,9,9,0],'O':[6,9,9,9,6,0],'P':[14,9,14,8,8,0],
  'R':[14,9,14,12,9,0],'S':[6,8,6,1,14,0],'T':[15,2,2,2,2,0],
  'U':[9,9,9,9,6,0],'V':[9,9,9,6,6,0],'W':[9,9,15,15,9,0],
  '%':[9,2,4,8,9,0],':':[0,2,0,2,0,0],'.':[0,0,0,0,2,0],
  '-':[0,0,7,0,0,0],'/':[1,1,2,4,8,0],
  'X':[9,6,6,6,9,0],
};
function dc(x,y,ch,inv=false){
  const r=F[ch.toUpperCase()]||F[' '];
  for(let i=0;i<6;i++){const b=r[i]||0;for(let c=0;c<4;c++){const on=(b>>(3-c))&1;sp(x+c,y+i,inv?(on?0:1):on);}}
}
function ds(x,y,s,inv=false){for(let i=0;i<s.length;i++)dc(x+i*5,y,s[i],inv);}

function drawJoy(cx,cy,half,lx,ly){
  const x0=cx-half,y0=cy-half,sz=half*2+1;
  fr(x0,y0,sz,sz);
  for(let i=x0+2;i<x0+sz-2;i+=2)sp(i,cy);
  for(let i=y0+2;i<y0+sz-2;i+=2)sp(cx,i);
  sp(x0+1,y0+1);sp(x0+sz-2,y0+1);sp(x0+1,y0+sz-2);sp(x0+sz-2,y0+sz-2);
  const inn=half-3;
  fb(cx+Math.round(lx*inn/99)-1,cy-Math.round(ly*inn/99)-1,3,3);
}

function drawVSlider(x,y,w,h,pct){
  fr(x,y,w,h);
  const fh=Math.round(pct*(h-2)/100);
  if(fh>0)fb(x+1,y+h-1-fh,w-2,fh);
}

function drawSig(cx,bot,conn){
  const bw=4,gap=1;
  const heights=[5,8,11,15];
  const totalW=4*bw+3*gap;
  const x0=cx-Math.floor(totalW/2);
  if(conn){
    const phase=Math.floor(tick/6)%6;
    const filled=phase>=4?4:phase+1;
    for(let i=0;i<4;i++){
      const bx=x0+i*(bw+gap),bh=heights[i],by=bot-bh;
      if(i<filled) fb(bx,by,bw,bh);
      else          fr(bx,by,bw,bh);
    }
  } else {
    for(let i=0;i<4;i++){
      const bx=x0+i*(bw+gap);
      fr(bx,bot-heights[i],bw,heights[i]);
    }
    const blink=(tick%8)<4;
    if(blink){
      const xx=x0+totalW+2,xy=bot-7;
      sp(xx,xy);sp(xx+4,xy);sp(xx+1,xy+1);sp(xx+3,xy+1);
      sp(xx+2,xy+2);sp(xx+1,xy+3);sp(xx+3,xy+3);
      sp(xx,xy+4);sp(xx+4,xy+4);
    }
  }
}

function drawBatH(bx,by,bw,bh,pct){
  const nh=Math.max(2,Math.floor(bh/2)-1);
  const ny=by+Math.floor((bh-nh)/2);
  fb(bx,ny,2,nh);
  const bodyX=bx+2;
  fr(bodyX,by,bw,bh);
  const blink=pct<20&&(tick%10)>=5;
  if(!blink){
    const fw=Math.round(pct*(bw-2)/100);
    if(fw>0)fb(bodyX+bw-1-fw,by+1,fw,bh-2);
  }
}

function drawBtn(x,y,w,h,lbl,act){
  if(act){fb(x,y,w,h);ds(x+Math.floor((w-lbl.length*5+1)/2),y+Math.floor((h-6)/2),lbl,true);}
  else{fr(x,y,w,h);ds(x+Math.floor((w-lbl.length*5+1)/2),y+Math.floor((h-6)/2),lbl);}
}

function render(){
  const lx=+document.getElementById('lx').value;
  const ly=+document.getElementById('ly').value;
  const rx=+document.getElementById('rx').value;
  const ry=+document.getElementById('ry').value;
  const p1=+document.getElementById('p1').value;
  const p2=+document.getElementById('p2').value;
  const bat=+document.getElementById('bat').value;
  const lb=document.getElementById('lb').checked;
  const ls=document.getElementById('ls').checked;
  const sw1=document.getElementById('sw1').checked;
  const sw2=document.getElementById('sw2').checked;
  const rs=document.getElementById('rs').checked;
  const rb=document.getElementById('rb').checked;
  const conn=document.getElementById('conn').checked;
  buf.fill(0);

  drawJoy(13,14,12,lx,ly);
  drawVSlider(29,2,5,25,p1);
  drawSig(64,22,conn);
  drawVSlider(94,2,5,25,p2);
  drawJoy(114,14,12,rx,ry);

  hl(0,29,128);

  const BW=14,BH=12,BY=31;
  drawBtn(2, BY,BW,BH,'LB',lb);
  drawBtn(19,BY,BW,BH,'LS',ls);
  drawBtn(36,BY,BW,BH,'S1',sw1);
  drawBtn(78,BY,BW,BH,'S2',sw2);
  drawBtn(95,BY,BW,BH,'RS',rs);
  drawBtn(112,BY,BW,BH,'RB',rb);

  hl(0,45,128);

  const boxX=0,boxY=46,boxW=58,boxH=17;
  fr(boxX,boxY,boxW,boxH);
  const line1='HASHTAG',line2='URC V2.0';
  ds(boxX+Math.floor((boxW-line1.length*5)/2),boxY+3,line1);
  ds(boxX+Math.floor((boxW-line2.length*5)/2),boxY+10,line2);

  // Fixed layout computed from right edge:
  // [margin:1][text:20px "100%"=4*5][gap:3][body:20][nub:2] = 46px from right
  // text slot = 20px (fits "100%" exactly), gap = 3px breathing room
  const NUB=2,batBW=20,batBH=9,batY=50;
  const TEXTW=20; // 4 chars * 5px = "100%" worst case
  const GAP=3,MARGIN=1;
  // nub left edge:
  const batX=W-MARGIN-TEXTW-GAP-batBW-NUB; // =128-1-20-3-20-2=82
  drawBatH(batX,batY,batBW,batBH,bat);

  // text right-aligned to W-MARGIN, always within TEXTW slot
  const bs=bat+'%';
  const textX=W-MARGIN-bs.length*5; // right-align to edge
  ds(textX,batY+Math.floor((batBH-6)/2),bs);

  const img=gx.createImageData(256,128);const d=img.data;
  const fg='#a8e6a0',bg='#0d1a0d';
  for(let py=0;py<H;py++)for(let px=0;px<W;px++){
    const on=buf[py*W+px],col=on?fg:bg;
    const r=parseInt(col.slice(1,3),16),gg=parseInt(col.slice(3,5),16),b=parseInt(col.slice(5,7),16);
    for(let dy=0;dy<2;dy++)for(let dx=0;dx<2;dx++){
      const i=((py*2+dy)*256+(px*2+dx))*4;
      d[i]=r;d[i+1]=gg;d[i+2]=b;d[i+3]=255;
    }
  }
  gx.putImageData(img,0,0);
}

document.querySelectorAll('input').forEach(e=>e.addEventListener('input',render));
setInterval(()=>{tick=(tick+1)%200;render();},50);
render();
</script>
</body>
</html>
